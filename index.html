<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>歩値CSVリプレイ Interactive v1</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
:root{--bg:#202b31;--text:#e8eef2;--green:#1f7a00;--red:#8a0d0d;--yellow:#e2a23b}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
header{height:48px;display:flex;align-items:center;gap:12px;padding:0 14px;border-bottom:1px solid #83919a;font-weight:700;white-space:nowrap;overflow:hidden}
.codebox{border:1px solid #aab5bb;border-radius:4px;color:#b8c3c8;padding:3px 8px}.topnum{font-size:17px}
input[type=file]{max-width:260px;color:#dce5e9}
.layout{display:grid;grid-template-columns:34% 66%;height:calc(100vh - 49px)}
.left{border-right:1px solid #8b9aa2;overflow:hidden;display:flex;flex-direction:column}
.tabs{height:38px;display:flex;align-items:end;border-bottom:1px solid #778890}.tab{padding:8px 24px;color:#58a6d6;font-weight:700;border-bottom:3px solid #58a6d6}
.tapeWrap{flex:1;overflow:hidden}table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:15px}
thead th{position:sticky;top:0;background:#4a4d4d;color:white;padding:6px;border:1px solid #707879}
tbody td{padding:4px 6px;border:1px solid #52636b;text-align:right;font-weight:700}tbody td.time{text-align:center;font-size:13px}
tr.up td.price,tr.up td.qty,tr.up td.amount{background:var(--green);color:white}
tr.down td.price,tr.down td.qty,tr.down td.amount{background:var(--red);color:white}
tr.flat td.price,tr.flat td.qty,tr.flat td.amount{background:#29353b;color:white}
.right{display:flex;flex-direction:column}.controls{height:62px;display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #50616a;flex-wrap:wrap}
button,select,input[type=range],input[type=text]{background:#26343b;color:var(--text);border:1px solid #5594bc;padding:6px 10px;font-size:14px}
button.primary{background:#396d91}.stat{color:#c7d0d4;font-size:14px;min-width:115px}
#chart{flex:1;min-height:0}.foot{height:25px;color:#b4c0c5;font-size:12px;padding:3px 12px;border-top:1px solid #52636b}
.note{color:#b4c0c5;font-size:12px} a.linkbtn{color:#dce5e9;text-decoration:none;border:1px solid #5594bc;padding:5px 8px;background:#26343b;font-size:13px}.metricPlus{color:#8ee89a;font-weight:800}.metricMinus{color:#ff9a9a;font-weight:800}.metricNeutral{color:#dce5e9;font-weight:700}
</style>
</head>
<body>
<header>
<span class="codebox">歩値CSV</span>
<input id="csvFile" type="file" accept=".csv,text/csv">
<button id="loadSampleHint">CSV読込</button>
<label class="note">コード <input id="stockCode" type="text" value="" placeholder="自動" style="width:62px"></label>
<label class="note">日付 <input id="tradeDate" type="text" value="" placeholder="自動" style="width:92px"></label>
<input id="symbolName" type="text" value="" placeholder="銘柄名 自動" style="width:150px">
<a id="kabutanDaily" class="linkbtn" target="_blank" rel="noopener">株探時系列</a>
<a id="kabutanBasic" class="linkbtn" target="_blank" rel="noopener">株探基本</a>
<label class="note">前日終値 <input id="prevClose" type="text" placeholder="手入力" style="width:78px"></label>
<span class="topnum" id="titleSymbol">未読込</span>
<span>現在 <span id="nowPrice">-</span></span>
<span>前日比 <span id="chg">-</span> / <span id="chgPct">-</span></span>
<span>VWAP <span id="vwapNow">-</span> / 乖離 <span id="vwapDev">-</span></span>
<span>時刻 <span id="nowTime">-</span></span>
</header>

<div class="layout">
<section class="left">
<div class="tabs"><div class="tab">歩み値</div></div>
<div class="tapeWrap"><table><thead><tr><th>値段</th><th>株数</th><th>金額<br>(億円)</th><th>時刻</th></tr></thead><tbody id="tape"></tbody></table></div>
</section>
<section class="right">
<div class="controls">
<button id="play" class="primary">再生</button><button id="pause">停止</button><button id="reset">先頭</button>
<label>足 <select id="barMode"><option value="1">1分足</option><option value="5" selected>5分足</option></select></label>
<label>速度 <select id="speed"><option value="0.25">0.25倍</option><option value="0.5">0.5倍</option><option value="1">1倍</option><option value="5">5倍</option><option value="20" selected>20倍</option><option value="60">60倍</option><option value="300">300倍</option></select></label>
<label>表示 <select id="windowMode"><option value="auto" selected>直近中心</option><option value="all">当日全体</option></select></label>
<input id="slider" type="range" min="0" max="0" value="0" style="width:23%">
<span class="stat" id="progress">0 / 0</span>
<span class="stat" id="clock">--:--:--</span>
</div>
<div id="chart"></div>
<div class="foot">UTF-8 CSV想定。ファイル名 QR-nnnn-yyyymmdd からコード・日付を取得。銘柄名はJPX東証上場銘柄一覧を埋め込み参照。前日終値は株探時系列リンクから確認して手入力。</div>
</section>
</div>

function parseTimeMs(s){
  const m=String(s).trim().match(/(\d{1,2}):(\d{2}):(\d{2})(?:\.(\d{1,3}))?/);
  if(!m)return null;
  const h=Number(m[1]),mi=Number(m[2]),se=Number(m[3]),ms=Number((m[4]||"0").padEnd(3,"0"));
  return {display:pad2(h)+":"+pad2(mi)+":"+pad2(se)+"."+String(ms).padStart(3,"0"), secKey:pad2(h)+":"+pad2(mi)+":"+pad2(se), ms:((h*3600+mi*60+se)*1000+ms)};

function parseCSV(text){
  const rows=[];let row=[],field="",q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i],n=text[i+1];
    if(q){
      if(c=='"'&&n=='"'){field+='"';i++}
      else if(c=='"'){q=false}
      else field+=c;
    }else{
      if(c=='"')q=true;
      else if(c==","){row.push(field);field=""}
      else if(c=="\n"){row.push(field);rows.push(row);row=[];field=""}
      else if(c=="\r"){}
      else field+=c;
    }
  }
  if(field.length||row.length){row.push(field);rows.push(row)}
  return rows.filter(r=>r.some(x=>String(x).trim()!==""));
}
function findCol(headers, patterns){

    if(i>=0)return i;
  }
  return -1;
}
function buildDataFromRows(rows, filename){
  if(rows.length<2)throw new Error("CSV行が少なすぎます");
  const headers=rows[0].map(h=>String(h).trim());
  const timeCol=findCol(headers,["時刻","time"]);
  const priceCol=findCol(headers,["値段","価格","price"]);
  const qtyCol=findCol(headers,["株数","数量","出来高","qty","volume"]);
  const amountCol=findCol(headers,["金額","amount"]);
  if(timeCol<0||priceCol<0||qtyCol<0)throw new Error("必要列が見つかりません。時刻・値段・株数 が必要です。検出ヘッダー: "+headers.join(" / "));

  let raw=[];
  for(let r=1;r<rows.length;r++){
    const row=rows[r], tm=parseTimeMs(row[timeCol]);
    const price=cleanNum(row[priceCol]), qty=cleanNum(row[qtyCol]);
    if(!tm||!Number.isFinite(price)||!Number.isFinite(qty))continue;
    let amount=amountCol>=0?cleanNum(row[amountCol]):price*qty;
    if(!Number.isFinite(amount))amount=price*qty;
    raw.push({time:tm.display,secKey:tm.secKey,ms:tm.ms,price:Math.round(price),qty:Math.round(qty),amount});
  }
  raw.sort((a,b)=>a.ms-b.ms);

  // direction
  let lastDir=0,prev=null;
  for(const x of raw){
    let d=0;
    if(prev!=null){if(x.price>prev)d=1;else if(x.price<prev)d=-1;else d=lastDir}
    x.dir=d;if(d!==0)lastDir=d;prev=x.price;
  }

  // same-second smooth play_ms
  const counts=new Map(), seqs=new Map();
  for(const x of raw)counts.set(x.secKey,(counts.get(x.secKey)||0)+1);
  for(const x of raw){
    const seq=seqs.get(x.secKey)||0, cnt=counts.get(x.secKey)||1;
    x.playMs=x.ms+Math.floor(((seq+0.5)/cnt)*1000);
    seqs.set(x.secKey,seq+1);
  }

  let cumPV=0,cumVol=0;
  const ticks=raw.map(x=>{
    cumPV+=x.price*x.qty; cumVol+=x.qty;
    const vwap=cumVol?cumPV/cumVol:null;
    return [x.time,x.price,x.qty,Number((x.amount/100000000).toFixed(4)),x.dir,x.ms,x.playMs,Number(vwap.toFixed(2))];
  });
  const totalVolume=raw.reduce((a,b)=>a+b.qty,0);
  const totalAmount=raw.reduce((a,b)=>a+b.amount,0)/100000000;
  const info=parseFilenameInfo(filename);
  const master=lookupStock(info.code);
  const name=document.getElementById("symbolName").value.trim();
  return {
    code:info.code,
    tradeDate:info.date,
    symbol:name || (master ? master.name : (info.code ? info.code : filename.replace(/\.csv$/i,""))),
    market:master ? master.market : "",
    industry:master ? master.industry : "",
    tickCount:ticks.length,
    ticks,
    summary:{totalVolume,totalAmountOku:Number(totalAmount.toFixed(2)),startPlayMs:ticks[0][6],endPlayMs:ticks[ticks.length-1][6],startMs:ticks[0][5],endMs:ticks[ticks.length-1][5]}
  };
}

  const vwapLine={type:"scatter",mode:"lines",x,y:vwap,name:"VWAP",line:{color:"#d8d8d8",width:1.5},xaxis:"x",yaxis:"y"};
  const volume={type:"bar",x,y:vol,name:"出来高",marker:{color:"#e2a23b"},opacity:.85,xaxis:"x",yaxis:"y2"};
  const axisSpike={showspikes:true,spikemode:"across",spikesnap:"cursor",spikethickness:1,spikedash:"dot",spikecolor:"#dce5e9",showline:true};
  const layout={margin:{l:54,r:62,t:18,b:42},paper_bgcolor:"#202b31",plot_bgcolor:"#202b31",font:{color:"#dce5e9"},
    xaxis:{rangeslider:{visible:false},gridcolor:"#43545c",tickfont:{size:11},...axisSpike},
    yaxis:{domain:[.30,1],range:[minP-pad,maxP+pad],gridcolor:"#66777f",tickformat:",d",autorange:false,...axisSpike},
    yaxis2:{domain:[0,.23],range:[0,maxVol*1.20],gridcolor:"#5b6b72",tickformat:",d",title:"出来高(株)",autorange:false,...axisSpike},
    showlegend:true,legend:{orientation:"h",x:0,y:1.04},dragmode:"pan"};
  Plotly.react("chart",[candle,vwapLine,volume],layout,{displayModeBar:false,responsive:true,scrollZoom:true});
}
function addTickToTape(t){
  const tr=document.createElement("tr"),dir=t[4];tr.className=dir>0?"up":dir<0?"down":"flat";
  tr.innerHTML='<td class="price">'+t[1].toLocaleString()+'</td><td class="qty">'+t[2].toLocaleString()+'</td><td class="amount">'+t[3].toFixed(4)+'</td><td class="time">'+t[0]+'</td>';
  tapeBody.prepend(tr);while(tapeBody.children.length>120)tapeBody.removeChild(tapeBody.lastChild);
}
function rebuildTapeAround(){tapeBody.innerHTML="";for(let i=Math.max(0,idx-80);i<=idx;i++)addTickToTape(DATA.ticks[i])}
function updateHeader(){
  if(!DATA.ticks.length)return;
  const t=DATA.ticks[idx], price=t[1], vwap=t[7];
  nowTime.textContent=t[0];
  nowPrice.textContent=price.toLocaleString();
  document.getElementById("vwapNow").textContent=fmtNum(vwap,2);
  const devPct=(price/vwap-1)*100;
  setMetric("vwapDev",fmtPct(devPct),devPct);
  const prev=cleanNum(document.getElementById("prevClose").value);
  const diff=Number.isFinite(prev)?price-prev:NaN;
  const diffPct=Number.isFinite(prev)?(price/prev-1)*100:NaN;
  setMetric("chg",Number.isFinite(diff)?fmtSigned(diff,0):"-",diff);
  setMetric("chgPct",Number.isFinite(diffPct)?fmtPct(diffPct):"-",diffPct);
  slider.value=idx;
  progress.textContent=idx.toLocaleString()+" / "+DATA.tickCount.toLocaleString();
  clock.textContent=fmtMs(t[5]);
}
function advanceToPlayMs(ms){
  currentPlayMs=Math.min(ms,DATA.summary.endPlayMs);
  const nextIdx=findTickIndexByPlayMs(currentPlayMs);
  if(nextIdx>idx){for(let i=idx+1;i<=nextIdx;i++)addTickToTape(DATA.ticks[i]);idx=nextIdx}else{idx=nextIdx;rebuildTapeAround()}
  updateHeader();renderChart(false);if(currentPlayMs>=DATA.summary.endPlayMs)pause();
}
function play(){if(!DATA.ticks.length)return;pause();playBaseReal=performance.now();playBaseMarket=currentPlayMs;const speed=Number(document.getElementById("speed").value);timer=setInterval(()=>{const elapsed=performance.now()-playBaseReal;advanceToPlayMs(playBaseMarket+elapsed*speed)},35)}
function pause(){if(timer)clearInterval(timer);timer=null}
function resetAll(){
  pause();if(!DATA.ticks.length){renderChart(true);return}
  idx=0;currentPlayMs=DATA.summary.startPlayMs;tapeBody.innerHTML="";addTickToTape(DATA.ticks[0]);updateHeader();renderChart(true);
}
function installData(d){
  DATA=d;idx=0;currentPlayMs=DATA.summary.startPlayMs;
  document.getElementById("stockCode").value=DATA.code||"";
  document.getElementById("tradeDate").value=DATA.tradeDate||"";
  document.getElementById("symbolName").value=DATA.symbol||"";
  updateKabutanLinks(DATA.code);
  const sub=[DATA.market, DATA.industry].filter(Boolean).join(" / ");
  document.getElementById("titleSymbol").textContent="● "+(DATA.code?DATA.code+" ":"")+DATA.symbol+(sub?" ["+sub+"]":"")+(DATA.tradeDate?" / "+DATA.tradeDate:"");
  // total volume/amount are kept in DATA.summary but not shown in the compact header.
  slider.max=DATA.tickCount-1;slider.value=0;
  resetAll();
}
async function loadFile(file){
  const buf=await file.arrayBuffer();
  const text=new TextDecoder("utf-8").decode(buf);
  const rows=parseCSV(text);
  const data=buildDataFromRows(rows,file.name);
  installData(data);
}
document.getElementById("csvFile").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  loadFile(file).catch(err=>alert("CSV読込エラー: "+err.message));
});
document.getElementById("loadSampleHint").onclick=()=>document.getElementById("csvFile").click();
document.getElementById("prevClose").addEventListener("input", updateHeader);
document.getElementById("symbolName").addEventListener("change", ()=>{
  if(DATA.ticks.length){
    DATA.symbol=document.getElementById("symbolName").value.trim()||DATA.symbol;
    document.getElementById("stockCode").value=DATA.code||"";
  document.getElementById("tradeDate").value=DATA.tradeDate||"";
  document.getElementById("symbolName").value=DATA.symbol||"";
  updateKabutanLinks(DATA.code);
  const sub=[DATA.market, DATA.industry].filter(Boolean).join(" / ");
  document.getElementById("titleSymbol").textContent="● "+(DATA.code?DATA.code+" ":"")+DATA.symbol+(sub?" ["+sub+"]":"")+(DATA.tradeDate?" / "+DATA.tradeDate:"");
  }
});
document.getElementById("play").onclick=play;document.getElementById("pause").onclick=pause;document.getElementById("reset").onclick=resetAll;
document.getElementById("speed").onchange=()=>{if(timer)play()};
document.getElementById("barMode").onchange=e=>{barMinutes=Number(e.target.value);renderChart(true)};
document.getElementById("windowMode").onchange=()=>renderChart(true);
slider.oninput=e=>{if(!DATA.ticks.length)return;pause();idx=Number(e.target.value);currentPlayMs=DATA.ticks[idx][6];rebuildTapeAround();updateHeader();renderChart(true)};
updateKabutanLinks("");
renderChart(true);window.addEventListener("resize",()=>Plotly.Plots.resize("chart"));
</script>
</body>
</html>
